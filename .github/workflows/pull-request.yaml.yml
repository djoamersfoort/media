name: Run PR Tests
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/app/requirements.txt
          pip install black==26.3.1

      - name: Run black
        working-directory: ./api
        run: |
          black --check .

      - name: Run unit tests
        working-directory: ./api
        run: |
          cp .env.test .env
          PYTHONPATH="." pytest
